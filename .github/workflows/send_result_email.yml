name: Send Result Email

on:
  workflow_run:
    workflows: ["Evaluate Submission"]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  email-result:
    name: Send Evaluation Email
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download evaluation artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          run_id: ${{ github.event.workflow_run.id }}
          name: eval-${{ github.event.workflow_run.id }}
          path: artifacts
          if_no_artifact_found: fail

      - name: Resolve student details
        id: student
        shell: bash
        run: |
          ACTOR=$(cat artifacts/actor.txt)
          python workflow_helpers.py resolve \
            --students-file students.csv \
            --actor "$ACTOR" \
            --admin-email "${{ secrets.ADMIN_EMAIL }}" \
            --github-output "$GITHUB_OUTPUT" \
            --unmapped-csv artifacts/unmapped_students.csv \
            --workflow-run-id "${{ github.event.workflow_run.id }}" \
            --workflow-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"

      - name: Record unmapped user for admin review
        if: ${{ steps.student.outputs.mapped == 'false' }}
        shell: bash
        run: |
          echo "Unmapped actor detected and recorded: ${{ steps.student.outputs.actor }}"

      - name: Upload unmapped-user artifact
        if: ${{ steps.student.outputs.mapped == 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: unmapped-student-${{ github.event.workflow_run.id }}
          path: artifacts/unmapped_students.csv
          if-no-files-found: error
          retention-days: 14

      - name: Create tracking issue for unmapped user
        if: ${{ steps.student.outputs.mapped == 'false' }}
        uses: actions/github-script@v7
        with:
          script: |
            const actor = `${{ steps.student.outputs.actor }}`;
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}`;
            const title = `Unmapped student detected: ${actor}`;
            const body = [
              "Automated alert from Send Result Email workflow.",
              "",
              `- GitHub username: \`${actor}\``,
              `- Workflow run: ${runUrl}`,
              "",
              "Please add this user to `students.csv` with student_name and email."
            ].join("\n");

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.data.find((i) => i.title === title);
            if (existing) {
              core.info(`Tracking issue already exists: #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
              core.info(`Created tracking issue #${created.data.number}`);
            }

      - name: Comment on PR for unmapped user
        if: ${{ steps.student.outputs.mapped == 'false' && github.event.workflow_run.event == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests || [];
            if (!prs.length) {
              core.info("No pull request found on workflow_run payload.");
              return;
            }
            const actor = `${{ steps.student.outputs.actor }}`;
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}`;
            const body = [
              `Automated notice: no students.csv mapping found for \`${actor}\`.`,
              `Fallback recipient was used.`,
              `Workflow run: ${runUrl}`,
              "Please update students.csv."
            ].join("\n");
            for (const pr of prs) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body
              });
              core.info(`Commented on PR #${pr.number}`);
            }

      - name: Send result email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        run: |
          python email_sender.py "${{ steps.student.outputs.email }}" --student-name "${{ steps.student.outputs.name }}" --result-file artifacts/result.txt --subject "Assignment Evaluation Result"

      - name: Print delivery summary
        run: |
          echo "Email attempted for GitHub user: ${{ steps.student.outputs.actor }}"
          echo "Recipient: ${{ steps.student.outputs.email }}"
          echo "Mapped user in students.csv: ${{ steps.student.outputs.mapped }}"
          if [ "${{ steps.student.outputs.mapped }}" = "false" ]; then
            echo "Admin action required: add this GitHub username to students.csv"
          fi
