name: Evaluate Submission

on:
  push:
    paths:
      - "submissions/**.py"
      - "submissions/**.java"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evaluate:
    name: Evaluate Student Submission
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find submitted file
        id: submission
        shell: bash
        run: |
          ACTOR="${{ github.actor }}"

          # Prefer the current actor's submission folder for predictable selection.
          FILE=$(find "submissions/$ACTOR" -type f \( -name "*.py" -o -name "*.java" \) 2>/dev/null | head -n1 || true)
          if [ -z "$FILE" ]; then
            FILE=$(find submissions -type f \( -name "*.py" -o -name "*.java" \) | head -n1 || true)
          fi

          if [ -z "$FILE" ]; then
            echo "No submission file found under submissions/."
            exit 1
          fi

          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "actor=$ACTOR" >> "$GITHUB_OUTPUT"
          echo "Selected submission file: $FILE"

      - name: Build grader sandbox image
        run: |
          docker build -f Dockerfile.grader -t assignment-grader:latest .

      - name: Evaluate submission in Docker sandbox
        run: |
          docker run --rm \
            --network none \
            --cpus="1.0" \
            --memory="512m" \
            --pids-limit=128 \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --user "$(id -u):$(id -g)" \
            -v "${PWD}:/workspace" \
            -w /workspace \
            assignment-grader:latest \
            python evaluator.py "${{ steps.submission.outputs.file }}" --student-name "${{ steps.submission.outputs.actor }}" --result-file result.txt

      - name: Save metadata artifact
        shell: bash
        run: |
          mkdir -p artifacts
          echo "${{ steps.submission.outputs.actor }}" > artifacts/actor.txt
          cp result.txt artifacts/result.txt

      - name: Publish score summary
        shell: bash
        run: |
          echo "## Evaluation Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat result.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eval-${{ github.run_id }}
          path: |
            artifacts/result.txt
            artifacts/actor.txt
          if-no-files-found: error
          retention-days: 14
