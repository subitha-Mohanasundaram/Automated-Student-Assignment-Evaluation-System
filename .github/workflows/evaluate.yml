name: Evaluate Submission

on:
  push:
    paths:
      - "submissions/**.py"
      - "submissions/**.java"
  workflow_dispatch:
    inputs:
      submission_file:
        description: "Submission file path (e.g. submissions/user/student_solution.java)"
        required: false
        type: string
      problem_id:
        description: "Problem id override (optional)"
        required: false
        type: string
      student_name:
        description: "Student display name override (optional)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  evaluate:
    name: Evaluate Student Submission
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find submitted file
        id: submission
        shell: bash
        run: |
          ACTOR="${{ github.actor }}"
          FILE=""
          USERNAME=""
          DISPLAY_NAME=""
          PROBLEM_ID="${{ github.event.inputs.problem_id }}"
          INPUT_FILE="${{ github.event.inputs.submission_file }}"
          INPUT_STUDENT_NAME="${{ github.event.inputs.student_name }}"

          # For manual runs, first honor explicitly provided submission file.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$INPUT_FILE" ]; then
            if [ -f "$INPUT_FILE" ]; then
              FILE="$INPUT_FILE"
            else
              echo "Provided submission_file does not exist: $INPUT_FILE"
              exit 1
            fi
          fi

          # On push events, prefer the actual file changed in this commit.
          if [ -z "$FILE" ] && [ "${{ github.event_name }}" = "push" ]; then
            FILE=$(git show --name-only --pretty="" "${{ github.sha }}" | grep '^submissions/.*\.\(py\|java\)$' | head -n1 || true)
          fi

          # Fallback: actor-specific submissions folder.
          if [ -z "$FILE" ]; then
            FILE=$(find "submissions/$ACTOR" -type f \( -name "*.py" -o -name "*.java" \) 2>/dev/null | head -n1 || true)
          fi

          # Final fallback: any submission file in repo.
          if [ -z "$FILE" ]; then
            FILE=$(find submissions -type f \( -name "*.py" -o -name "*.java" \) | head -n1 || true)
          fi

          if [ -z "$FILE" ]; then
            echo "No submission file found under submissions/."
            exit 1
          fi

          USERNAME=$(echo "$FILE" | awk -F/ '{print $2}')
          if [ -z "$USERNAME" ]; then
            echo "Unable to infer username from path: $FILE"
            exit 1
          fi

          if [ -n "$INPUT_STUDENT_NAME" ]; then
            DISPLAY_NAME="$INPUT_STUDENT_NAME"
          else
            DISPLAY_NAME="$USERNAME"
          fi

          if [ -z "$PROBLEM_ID" ]; then
            # submissions/<username>/<problem_id>/file.ext (optional)
            SEG3=$(echo "$FILE" | awk -F/ '{print $3}')
            if [ -n "$SEG3" ] && [[ "$SEG3" != *.* ]]; then
              PROBLEM_ID="$SEG3"
            fi
          fi

          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"
          echo "display_name=$DISPLAY_NAME" >> "$GITHUB_OUTPUT"
          echo "problem_id=$PROBLEM_ID" >> "$GITHUB_OUTPUT"
          if [[ "$FILE" == *.java ]]; then
            echo "lang=java" >> "$GITHUB_OUTPUT"
          else
            echo "lang=python" >> "$GITHUB_OUTPUT"
          fi
          echo "Selected submission file: $FILE"
          echo "Submission username: $USERNAME"
          echo "Resolved problem id: ${PROBLEM_ID:-add_numbers}"

      - name: Build grader sandbox image
        run: |
          docker build -f Dockerfile.grader -t assignment-grader:latest .

      - name: Evaluate submission in Docker sandbox
        run: |
          PROBLEM_ARG=""
          if [ -n "${{ steps.submission.outputs.problem_id }}" ]; then
            PROBLEM_ARG="--problem-id ${{ steps.submission.outputs.problem_id }}"
          fi
          docker run --rm \
            --network none \
            --cpus="1.0" \
            --memory="512m" \
            --pids-limit=128 \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --user "$(id -u):$(id -g)" \
            -v "${PWD}:/workspace" \
            -w /workspace \
            assignment-grader:latest \
            sh -lc "python evaluator.py '${{ steps.submission.outputs.file }}' --student-name '${{ steps.submission.outputs.display_name }}' --result-file result.txt $PROBLEM_ARG"

      - name: Save metadata artifact
        shell: bash
        run: |
          mkdir -p artifacts
          echo "${{ steps.submission.outputs.username }}" > artifacts/actor.txt
          echo "${{ steps.submission.outputs.file }}" > artifacts/file.txt
          echo "${{ steps.submission.outputs.lang }}" > artifacts/lang.txt
          cp result.txt artifacts/result.txt

      - name: Publish score summary
        shell: bash
        run: |
          PROBLEM_SUMMARY="${{ steps.submission.outputs.problem_id }}"
          if [ -z "$PROBLEM_SUMMARY" ]; then
            PROBLEM_SUMMARY="add_numbers"
          fi
          echo "## Evaluation Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Selected file: ${{ steps.submission.outputs.file }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Submission username: ${{ steps.submission.outputs.username }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Display name: ${{ steps.submission.outputs.display_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Selected language: ${{ steps.submission.outputs.lang }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Problem ID: $PROBLEM_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat result.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eval-${{ github.run_id }}
          path: |
            artifacts/result.txt
            artifacts/actor.txt
            artifacts/file.txt
            artifacts/lang.txt
          if-no-files-found: error
          retention-days: 14
