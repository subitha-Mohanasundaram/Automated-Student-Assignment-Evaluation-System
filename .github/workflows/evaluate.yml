name: Evaluate Submission

on:
  push:
    paths:
      - "submissions/**.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evaluate:
    name: Evaluate Student Submission
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Find submitted file
        id: submission
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FILE=$(find submissions -type f -name "*.py" | head -n1 || true)
          else
            FILE=$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" | grep '^submissions/.*\.py$' | head -n1 || true)
          fi

          if [ -z "$FILE" ]; then
            echo "No submission file found under submissions/."
            exit 1
          fi

          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "actor=${{ github.actor }}" >> "$GITHUB_OUTPUT"
          echo "Selected submission file: $FILE"

      - name: Evaluate submission
        run: |
          python evaluator.py "${{ steps.submission.outputs.file }}" --student-name "${{ steps.submission.outputs.actor }}" --result-file result.txt

      - name: Save metadata artifact
        shell: bash
        run: |
          mkdir -p artifacts
          echo "${{ steps.submission.outputs.actor }}" > artifacts/actor.txt
          cp result.txt artifacts/result.txt

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eval-${{ github.run_id }}
          path: |
            artifacts/result.txt
            artifacts/actor.txt
          if-no-files-found: error
          retention-days: 14
